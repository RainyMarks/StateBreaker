name: statebreaker-ci

on:
  push:
  pull_request:

jobs:
  core:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m ruff check .
      - run: python -m pytest
      - run: python -m mypy
      - run: python -m pip install -e ./plugin-template
      - run: statebreaker plugins list

  docker-lab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and start lab
        run: docker compose -f labs/coupon-race/compose.yaml up --build --wait --detach
      - name: Smoke test
        run: curl --fail --silent http://127.0.0.1:8080/healthz
      - name: Stop lab
        if: always()
        run: docker compose -f labs/coupon-race/compose.yaml down --volumes
