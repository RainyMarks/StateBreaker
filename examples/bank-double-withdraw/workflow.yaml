schema_version: "0.1"
name: bank-double-withdraw-demo
description: Normal single withdrawal flow where account balance must never go negative.
base_url: http://127.0.0.1:8091
sessions:
  alice:
    schema_version: "0.1"
    headers:
      User-Agent: StateBreaker-Lab/0.1
    cookies: {}
    follow_redirects: true
variables:
  withdraw_amount_cents: 10000
steps:
  - schema_version: "0.1"
    id: create-run
    role: setup
    session: alice
    request:
      schema_version: "0.1"
      method: POST
      path: /api/runs
      headers: {}
      query: {}
      json_body: {}
    extract:
      - schema_version: "0.1"
        name: run_id
        kind: jsonpath
        expression: $.run_id
    depends_on: []
    tags: [lab, reset, account]

  - schema_version: "0.1"
    id: state-before
    role: probe
    session: alice
    request:
      schema_version: "0.1"
      method: GET
      path: /api/runs/${run_id}/state
    depends_on: [create-run]
    tags: [state, before, balance]

  - schema_version: "0.1"
    id: withdraw-cash
    role: action
    session: alice
    request:
      schema_version: "0.1"
      method: POST
      path: /api/runs/${run_id}/withdraw
      json_body:
        amount_cents: ${withdraw_amount_cents}
    depends_on: [state-before]
    tags: [attack-target, bank, withdraw, balance]

  - schema_version: "0.1"
    id: state-after
    role: probe
    session: alice
    request:
      schema_version: "0.1"
      method: GET
      path: /api/runs/${run_id}/state
    depends_on: [withdraw-cash]
    tags: [state, after, balance]
state_probe_steps: [state-before, state-after]