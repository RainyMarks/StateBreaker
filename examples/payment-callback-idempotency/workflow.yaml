schema_version: "0.1"
name: payment-callback-idempotency-demo
description: Duplicate payment callbacks must not apply merchant credit more than once.
base_url: http://127.0.0.1:8092
sessions:
  gateway:
    schema_version: "0.1"
    headers:
      User-Agent: StateBreaker-Lab/0.1
    cookies: {}
    follow_redirects: true
variables:
  payment_event_id: evt-demo-paid-001
  callback_amount_cents: 10000
steps:
  - schema_version: "0.1"
    id: create-run
    role: setup
    session: gateway
    request:
      schema_version: "0.1"
      method: POST
      path: /api/runs
      headers: {}
      query: {}
      json_body: {}
    extract:
      - schema_version: "0.1"
        name: run_id
        kind: jsonpath
        expression: $.run_id
    depends_on: []
    tags: [lab, reset, order]

  - schema_version: "0.1"
    id: state-before
    role: probe
    session: gateway
    request:
      schema_version: "0.1"
      method: GET
      path: /api/runs/${run_id}/state
    depends_on: [create-run]
    tags: [state, before, payment]

  - schema_version: "0.1"
    id: payment-callback
    role: action
    session: gateway
    request:
      schema_version: "0.1"
      method: POST
      path: /api/runs/${run_id}/payment-callback
      json_body:
        event_id: ${payment_event_id}
        amount_cents: ${callback_amount_cents}
    depends_on: [state-before]
    tags: [attack-target, payment, callback, idempotency]

  - schema_version: "0.1"
    id: state-after
    role: probe
    session: gateway
    request:
      schema_version: "0.1"
      method: GET
      path: /api/runs/${run_id}/state
    depends_on: [payment-callback]
    tags: [state, after, payment]
state_probe_steps: [state-before, state-after]