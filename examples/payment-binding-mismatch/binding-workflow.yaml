schema_version: "0.1"
name: payment-binding-mismatch-demo
description: A payment token created for Alice's order must not be accepted for Bob's order.
base_url: http://127.0.0.1:8094
sessions:
  alice:
    schema_version: "0.1"
    headers:
      User-Agent: StateBreaker-Lab/0.1
      X-User: alice
    cookies: {}
    follow_redirects: true
  bob:
    schema_version: "0.1"
    headers:
      User-Agent: StateBreaker-Lab/0.1
      X-User: bob
    cookies: {}
    follow_redirects: true
variables: {}
steps:
  - schema_version: "0.1"
    id: create-run
    role: setup
    session: alice
    request:
      schema_version: "0.1"
      method: POST
      path: /api/runs
      headers: {}
      query: {}
      json_body: {}
    extract:
      - schema_version: "0.1"
        name: run_id
        kind: jsonpath
        expression: $.run_id
      - schema_version: "0.1"
        name: alice_order_id
        kind: jsonpath
        expression: $.alice_order.order_id
      - schema_version: "0.1"
        name: bob_order_id
        kind: jsonpath
        expression: $.bob_order.order_id
    depends_on: []
    tags: [lab, reset, payment, order]

  - schema_version: "0.1"
    id: state-before
    role: probe
    session: alice
    request:
      schema_version: "0.1"
      method: GET
      path: /api/runs/${run_id}/state
    depends_on: [create-run]
    tags: [state, before, payment, binding]

  - schema_version: "0.1"
    id: alice-create-token
    role: setup
    session: alice
    request:
      schema_version: "0.1"
      method: POST
      path: /api/runs/${run_id}/payment-tokens
      json_body:
        order_id: ${alice_order_id}
    extract:
      - schema_version: "0.1"
        name: alice_payment_token
        kind: jsonpath
        expression: $.payment_token
    depends_on: [state-before]
    tags: [payment, token, binding, precondition]

  - schema_version: "0.1"
    id: alice-token-pay-bob-order
    role: action
    session: alice
    request:
      schema_version: "0.1"
      method: POST
      path: /api/runs/${run_id}/orders/${bob_order_id}/pay
      json_body:
        payment_token: ${alice_payment_token}
    depends_on: [alice-create-token]
    tags: [attack-target, payment, binding-mismatch, token-mismatch, unauthorized-payment]

  - schema_version: "0.1"
    id: state-after
    role: probe
    session: alice
    request:
      schema_version: "0.1"
      method: GET
      path: /api/runs/${run_id}/state
    depends_on: [alice-token-pay-bob-order]
    tags: [state, after, payment, binding]
state_probe_steps: [state-before, state-after]
