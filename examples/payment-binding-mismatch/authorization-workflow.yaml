schema_version: "0.1"
name: payment-authorization-bypass-demo
description: Alice must not be able to pay Bob's order by changing the target order id.
base_url: http://127.0.0.1:8094
sessions:
  alice:
    schema_version: "0.1"
    headers:
      User-Agent: StateBreaker-Lab/0.1
      X-User: alice
    cookies: {}
    follow_redirects: true
  bob:
    schema_version: "0.1"
    headers:
      User-Agent: StateBreaker-Lab/0.1
      X-User: bob
    cookies: {}
    follow_redirects: true
variables: {}
steps:
  - schema_version: "0.1"
    id: create-run
    role: setup
    session: alice
    request:
      schema_version: "0.1"
      method: POST
      path: /api/runs
      headers: {}
      query: {}
      json_body: {}
    extract:
      - schema_version: "0.1"
        name: run_id
        kind: jsonpath
        expression: $.run_id
      - schema_version: "0.1"
        name: bob_order_id
        kind: jsonpath
        expression: $.bob_order.order_id
    depends_on: []
    tags: [lab, reset, payment, order]

  - schema_version: "0.1"
    id: state-before
    role: probe
    session: alice
    request:
      schema_version: "0.1"
      method: GET
      path: /api/runs/${run_id}/state
    depends_on: [create-run]
    tags: [state, before, payment, authorization]

  - schema_version: "0.1"
    id: alice-pay-bob-order
    role: action
    session: alice
    request:
      schema_version: "0.1"
      method: POST
      path: /api/runs/${run_id}/orders/${bob_order_id}/pay
      json_body: {}
    depends_on: [state-before]
    tags: [attack-target, payment, authorization-bypass, unauthorized-payment, ownership]

  - schema_version: "0.1"
    id: state-after
    role: probe
    session: alice
    request:
      schema_version: "0.1"
      method: GET
      path: /api/runs/${run_id}/state
    depends_on: [alice-pay-bob-order]
    tags: [state, after, payment, authorization]
state_probe_steps: [state-before, state-after]
