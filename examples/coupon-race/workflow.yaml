schema_version: "0.1"
name: coupon-race-demo
description: 老王奶茶铺 BUG50 的正常单次兑换流程
base_url: http://127.0.0.1:8080
sessions:
  alice:
    schema_version: "0.1"
    headers:
      User-Agent: StateBreaker-Lab/0.1
    cookies: {}
    follow_redirects: true
variables:
  coupon_code: BUG50
steps:
  - schema_version: "0.1"
    id: create-run
    role: setup
    session: alice
    request:
      schema_version: "0.1"
      method: POST
      path: /api/runs
      headers: {}
      query: {}
      json_body: {}
    extract:
      - schema_version: "0.1"
        name: run_id
        kind: jsonpath
        expression: $.run_id
    depends_on: []
    tags: [lab, reset]

  - schema_version: "0.1"
    id: state-before
    role: probe
    session: alice
    request:
      schema_version: "0.1"
      method: GET
      path: /api/runs/${run_id}/state
    depends_on: [create-run]
    tags: [state, before]

  - schema_version: "0.1"
    id: redeem-coupon
    role: action
    session: alice
    request:
      schema_version: "0.1"
      method: POST
      path: /api/runs/${run_id}/redeem
      json_body:
        coupon_code: ${coupon_code}
    depends_on: [state-before]
    tags: [attack-target, coupon]

  - schema_version: "0.1"
    id: state-after
    role: probe
    session: alice
    request:
      schema_version: "0.1"
      method: GET
      path: /api/runs/${run_id}/state
    depends_on: [redeem-coupon]
    tags: [state, after]
state_probe_steps: [state-before, state-after]
