services:
  payment-step-skip-lab:
    build:
      context: .
    init: true
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "127.0.0.1:${STATEBREAKER_LAB_PORT:-8090}:8000"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2)"
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 5s